<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPO | Operator Visibility — Peck Tag Retrofit</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        #scene-container { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #0a1a2e 0%, #020617 100%); }
        #three-canvas-host { position: absolute; inset: 0; }
        #three-canvas-host canvas { display: block; width: 100% !important; height: 100% !important; }

        /* HUD: Status bar — top-left, matches Module 3 */
        #status-bar { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.75); border: 1px solid #334155; padding: 10px 18px; font-family: 'Courier New', monospace; font-size: 12px; color: #06b6d4; z-index: 100; letter-spacing: 1px; backdrop-filter: blur(4px); }

        /* HUD: Phase indicator — top-left under status */
        #phase-info { position: absolute; top: 70px; left: 20px; background: rgba(15, 23, 42, 0.85); border: 1px solid #1e293b; border-left: 3px solid #06b6d4; padding: 14px 20px 14px 18px; z-index: 100; max-width: 400px; backdrop-filter: blur(4px); }
        .phase-num { font-family: 'Courier New', monospace; font-size: 10px; color: #64748b; letter-spacing: 0.3em; margin-bottom: 6px; }
        .phase-title { font-size: 18px; font-weight: 300; letter-spacing: 0.02em; color: #e2e8f0; line-height: 1.2; }
        .phase-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; letter-spacing: 0.04em; }

        /* HUD: Brand mark — top-right */
        #brand-mark { position: absolute; top: 20px; right: 20px; text-align: right; z-index: 100; pointer-events: none; }
        .brand-title { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.35em; color: #06b6d4; }
        .brand-sub { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.3em; color: #64748b; margin-top: 4px; }

        /* HUD: Latency strip — bottom-left */
        #latency-strip { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 100; }
        .lat-chip { background: rgba(0, 0, 0, 0.7); border: 1px solid #334155; padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.1em; color: #94a3b8; backdrop-filter: blur(4px); }
        .lat-chip strong { color: #06b6d4; font-weight: bold; }
        .lat-chip.amber strong { color: #f59e0b; }
        .lat-chip.green strong { color: #10b981; }

        /* HUD: Phase progress dots — bottom-right */
        #phase-dots { position: absolute; bottom: 24px; right: 20px; display: flex; gap: 6px; z-index: 100; }
        .phase-dot { width: 28px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; transition: all 0.3s; border: none; padding: 0; }
        .phase-dot.active { background: #06b6d4; box-shadow: 0 0 10px rgba(6,182,212,0.7); }

        /* Tactical Controls — bottom bar, matches all other modules */
        #controls { height: 70px; background: rgba(15, 23, 42, 0.95); border-top: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 1000; padding: 0 20px; }
        .step-btn { background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 12px 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; border-radius: 4px; font-family: sans-serif; }
        .step-btn:hover { background: #1e293b; color: white; border-color: #06b6d4; }
        .step-btn.active { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .auto-btn { margin-left: auto; border-color: #10b981; color: #10b981; }
        .auto-btn.on { background: rgba(16, 185, 129, 0.15); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        @media (max-width: 700px) {
            #phase-info { max-width: 60%; padding: 10px 14px; }
            .phase-title { font-size: 14px; }
            #latency-strip { display: none; }
            .step-btn { padding: 10px 12px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="scene-container">
        <div id="three-canvas-host"></div>

        <div id="status-bar">SYS_STATUS: AIRSPACE BLIND — LEGACY VISIBILITY GAPS DETECTED</div>

        <div id="phase-info">
            <div class="phase-num" id="phase-num">PHASE 01 / 04</div>
            <div class="phase-title" id="phase-title">The Low — invisible to the network</div>
            <div class="phase-sub" id="phase-sub">Drone path cuts blind through manned traffic</div>
        </div>

        <div id="brand-mark">
            <div class="brand-title">THE PECKING ORDER</div>
            <div class="brand-sub">0–499′ AGL · ATC OF THE LOW</div>
        </div>

        <div id="latency-strip">
            <div class="lat-chip">DRONE → BASE&nbsp;&nbsp;<strong>26 ms</strong></div>
            <div class="lat-chip">BASE → LEO&nbsp;&nbsp;<strong>26 ms</strong></div>
            <div class="lat-chip amber">END-TO-END&nbsp;&nbsp;<strong>52 ms</strong></div>
        </div>

        <div id="phase-dots">
            <button class="phase-dot active" data-phase="1" aria-label="Phase 1"></button>
            <button class="phase-dot" data-phase="2" aria-label="Phase 2"></button>
            <button class="phase-dot" data-phase="3" aria-label="Phase 3"></button>
            <button class="phase-dot" data-phase="4" aria-label="Phase 4"></button>
        </div>
    </div>

    <div id="controls">
        <button class="step-btn active" data-phase="1">1. Blind Sky</button>
        <button class="step-btn" data-phase="2">2. Peck Tag Retrofit</button>
        <button class="step-btn" data-phase="3">3. 4D Shroud</button>
        <button class="step-btn" data-phase="4">4. Clean Route</button>
        <button class="step-btn auto-btn on" id="auto-btn">■ AUTO-CYCLE: ON</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        const host = document.getElementById('three-canvas-host');
        let width = host.clientWidth;
        let height = host.clientHeight;

        // ─── Renderer ─────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(width, height);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        host.appendChild(renderer.domElement);

        // ─── Scene & Fog ──────────────────────────────────────
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a1a2e, 0.0042);

        // ─── Sky shader (tactical night) ──────────────────────
        const skyGeo = new THREE.SphereGeometry(2000, 32, 16);
        const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            depthWrite: false,
            uniforms: {
                topColor:    { value: new THREE.Color(0x020617) },
                midColor:    { value: new THREE.Color(0x0a1a2e) },
                horizonColor:{ value: new THREE.Color(0x123653) },
                groundColor: { value: new THREE.Color(0x000814) },
            },
            vertexShader: `
                varying vec3 vWorldPos;
                void main() {
                    vec4 wp = modelMatrix * vec4(position, 1.0);
                    vWorldPos = wp.xyz;
                    gl_Position = projectionMatrix * viewMatrix * wp;
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 midColor;
                uniform vec3 horizonColor;
                uniform vec3 groundColor;
                varying vec3 vWorldPos;
                void main() {
                    float h = normalize(vWorldPos).y;
                    vec3 col;
                    if (h > 0.0) {
                        float t = smoothstep(0.0, 0.5, h);
                        col = mix(horizonColor, midColor, t);
                        col = mix(col, topColor, smoothstep(0.4, 1.0, h));
                    } else {
                        col = mix(horizonColor, groundColor, smoothstep(0.0, -0.4, h));
                    }
                    gl_FragColor = vec4(col, 1.0);
                }
            `,
        });
        scene.add(new THREE.Mesh(skyGeo, skyMat));

        // ─── Starfield ────────────────────────────────────────
        const starsGeo = new THREE.BufferGeometry();
        const starCount = 800;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const r = 1500;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 0.7 + 0.05);
            starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
            starPos[i*3+1] = r * Math.cos(phi);
            starPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({
            color: 0xb8d4f0, size: 1.2, sizeAttenuation: false, transparent: true, opacity: 0.7
        }));
        scene.add(stars);

        // ─── Lights ───────────────────────────────────────────
        const moonLight = new THREE.DirectionalLight(0xb8c6dc, 0.55);
        moonLight.position.set(-50, 60, 30);
        scene.add(moonLight);
        scene.add(new THREE.HemisphereLight(0x4a6fa5, 0x0a1020, 0.3));
        scene.add(new THREE.AmbientLight(0xffffff, 0.18));
        // Cyan rim light from below for tactical feel
        const cyanRim = new THREE.PointLight(0x06b6d4, 0.6, 200);
        cyanRim.position.set(0, -10, 0);
        scene.add(cyanRim);

        // ─── Tactical terrain (dark with cyan grid) ───────────
        const terrainGeo = new THREE.PlaneGeometry(800, 800, 80, 80);
        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i), y = pos.getY(i);
            const r = Math.sqrt(x*x + y*y);
            const h = Math.sin(x * 0.04) * 1.2 + Math.cos(y * 0.05) * 1.0 + Math.sin((x+y) * 0.02) * 1.5 + Math.cos(r * 0.015) * 0.8;
            pos.setZ(i, h);
        }
        terrainGeo.computeVertexNormals();
        const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshStandardMaterial({
            color: 0x0a1525, roughness: 0.9, metalness: 0.0, flatShading: true, emissive: 0x041018, emissiveIntensity: 0.4
        }));
        terrain.rotation.x = -Math.PI / 2;
        terrain.position.y = -28;
        scene.add(terrain);

        // Cyan tactical grid overlay
        const gridSize = 600;
        const gridDiv = 30;
        const grid = new THREE.GridHelper(gridSize, gridDiv, 0x06b6d4, 0x064e6b);
        grid.position.y = -27.5;
        grid.material.transparent = true;
        grid.material.opacity = 0.25;
        scene.add(grid);

        // ─── Camera ───────────────────────────────────────────
        const camera = new THREE.PerspectiveCamera(42, width / height, 0.1, 3000);
        camera.position.set(48, 14, 58);
        camera.lookAt(0, 8, 0);

        // ─── Operator factories ───────────────────────────────
        function makeShroud() {
            const g = new THREE.Group();
            const outer = new THREE.Mesh(
                new THREE.SphereGeometry(1, 32, 24),
                new THREE.MeshBasicMaterial({ color: 0xf59e0b, transparent: true, opacity: 0.08, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide })
            );
            const mid = new THREE.Mesh(
                new THREE.SphereGeometry(0.85, 32, 24),
                new THREE.MeshBasicMaterial({ color: 0xf97316, transparent: true, opacity: 0.14, blending: THREE.AdditiveBlending, depthWrite: false })
            );
            const inner = new THREE.Mesh(
                new THREE.SphereGeometry(0.55, 32, 24),
                new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0.16, blending: THREE.AdditiveBlending, depthWrite: false })
            );
            const wire = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.0, 1),
                new THREE.MeshBasicMaterial({ color: 0xf59e0b, transparent: true, opacity: 0.45, wireframe: true, depthWrite: false })
            );
            g.add(outer, mid, inner, wire);
            g.scale.setScalar(0.001);
            g.userData.targetRadius = 1;
            return g;
        }

        function makePeckTag() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 16, 12),
                new THREE.MeshStandardMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 1.4, roughness: 0.4 })
            );
            const halo = new THREE.Mesh(
                new THREE.SphereGeometry(0.85, 16, 12),
                new THREE.MeshBasicMaterial({ color: 0x4ee0a8, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false })
            );
            g.add(body, halo);
            g.scale.setScalar(0.001);
            return g;
        }

        function makeBalloon(x, y, z) {
            const g = new THREE.Group();
            const points = [];
            for (let i = 0; i <= 20; i++) {
                const t = i / 20;
                const angle = t * Math.PI;
                const r = Math.sin(angle) * 4.5 * (1.0 - 0.15 * Math.cos(angle));
                const yy = -Math.cos(angle) * 5.5 + 1;
                points.push(new THREE.Vector2(r, yy));
            }
            const envelope = new THREE.Mesh(
                new THREE.LatheGeometry(points, 32),
                new THREE.MeshStandardMaterial({ color: 0x991b1b, roughness: 0.5, metalness: 0.05, emissive: 0x3a0a0a, emissiveIntensity: 0.3 })
            );
            g.add(envelope);

            const band = new THREE.Mesh(
                new THREE.TorusGeometry(4.4, 0.18, 8, 32),
                new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.4, emissive: 0x4a3000, emissiveIntensity: 0.4 })
            );
            band.rotation.x = Math.PI / 2;
            band.position.y = -0.5;
            g.add(band);

            const basket = new THREE.Mesh(
                new THREE.BoxGeometry(2.0, 1.4, 2.0),
                new THREE.MeshStandardMaterial({ color: 0x3a2515, roughness: 0.95 })
            );
            basket.position.y = -7.5;
            g.add(basket);

            for (let i = 0; i < 4; i++) {
                const ang = (i / 4) * Math.PI * 2;
                const rope = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.04, 4.5, 6),
                    new THREE.MeshStandardMaterial({ color: 0x1a1008 })
                );
                rope.position.set(Math.cos(ang) * 0.9, -5.2, Math.sin(ang) * 0.9);
                g.add(rope);
            }

            const flame = new THREE.Mesh(
                new THREE.ConeGeometry(0.25, 0.6, 8),
                new THREE.MeshBasicMaterial({ color: 0xffb040, transparent: true, opacity: 0.9 })
            );
            flame.position.y = -6.6;
            g.add(flame);

            g.position.set(x, y, z);
            g.userData.bob = { base: y, phase: Math.random() * Math.PI * 2 };

            const tag = makePeckTag();
            tag.position.set(0, 5.2, 0);
            g.add(tag);

            const shroud = makeShroud();
            shroud.position.copy(g.position);
            shroud.userData.targetRadius = 7.5;
            scene.add(shroud);

            scene.add(g);
            return { group: g, tag, shroud };
        }

        function makePlane(x, y, z, color) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.5, emissive: 0x101820, emissiveIntensity: 0.3 });

            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.25, 4.5, 12), mat);
            body.rotation.z = Math.PI / 2;
            g.add(body);

            const nose = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.7, 12), mat);
            nose.position.x = 2.55;
            nose.rotation.z = -Math.PI / 2;
            g.add(nose);

            const wing = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 6.5), mat);
            wing.position.x = 0.2;
            g.add(wing);

            const tailV = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.08), mat);
            tailV.position.set(-1.9, 0.5, 0);
            g.add(tailV);

            const tailH = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.08, 1.6), mat);
            tailH.position.set(-1.9, 0.0, 0);
            g.add(tailH);

            const canopy = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                new THREE.MeshStandardMaterial({ color: 0x06b6d4, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.7, emissive: 0x06b6d4, emissiveIntensity: 0.3 })
            );
            canopy.position.set(0.7, 0.3, 0);
            g.add(canopy);

            const prop = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 1.6, 0.05),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            prop.position.x = 2.95;
            g.add(prop);
            g.userData.prop = prop;

            g.position.set(x, y, z);
            g.userData.bob = { base: y, phase: Math.random() * Math.PI * 2 };

            const tag = makePeckTag();
            tag.position.set(-0.3, 1.0, 0);
            g.add(tag);

            const shroud = makeShroud();
            shroud.position.copy(g.position);
            shroud.userData.targetRadius = 6.5;
            shroud.userData.elongated = true;
            scene.add(shroud);

            scene.add(g);
            return { group: g, tag, shroud };
        }

        function makeGlider(x, y, z) {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xc8d0dc, roughness: 0.5, emissive: 0x1a2030, emissiveIntensity: 0.2 });

            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.12, 4.0, 10), mat);
            body.rotation.z = Math.PI / 2;
            g.add(body);

            const wing = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.05, 11.0), mat);
            g.add(wing);

            const tailV = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.05), mat);
            tailV.position.set(-1.7, 0.35, 0);
            g.add(tailV);

            const tailH = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 1.4), mat);
            tailH.position.set(-1.7, 0.05, 0);
            g.add(tailH);

            const canopy = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 10, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                new THREE.MeshStandardMaterial({ color: 0x06b6d4, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.75, emissive: 0x06b6d4, emissiveIntensity: 0.3 })
            );
            canopy.position.set(0.5, 0.18, 0);
            g.add(canopy);

            g.position.set(x, y, z);
            g.rotation.y = -0.3;
            g.userData.bob = { base: y, phase: Math.random() * Math.PI * 2 };

            const tag = makePeckTag();
            tag.position.set(-0.2, 0.9, 0);
            g.add(tag);

            const shroud = makeShroud();
            shroud.position.copy(g.position);
            shroud.userData.targetRadius = 7.0;
            shroud.userData.elongated = true;
            scene.add(shroud);

            scene.add(g);
            return { group: g, tag, shroud };
        }

        function makeSkydiver(x, y, z) {
            const g = new THREE.Group();
            const canopy = new THREE.Mesh(
                new THREE.SphereGeometry(2.4, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2),
                new THREE.MeshStandardMaterial({ color: 0xa83232, roughness: 0.6, side: THREE.DoubleSide, emissive: 0x2a0808, emissiveIntensity: 0.3 })
            );
            canopy.position.y = 1.5;
            g.add(canopy);

            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(Math.cos(a) * 2.3, 1.5, Math.sin(a) * 2.3),
                    new THREE.Vector3(0, -1.0, 0),
                ]);
                const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x444a55, transparent: true, opacity: 0.7 }));
                g.add(line);
            }

            const torso = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 1.0, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x1a1f2a })
            );
            torso.position.y = -1.2;
            g.add(torso);

            g.position.set(x, y, z);
            g.userData.bob = { base: y, phase: Math.random() * Math.PI * 2, slow: true };

            const tag = makePeckTag();
            tag.position.set(0, 3.4, 0);
            g.add(tag);

            const shroud = makeShroud();
            shroud.position.copy(g.position);
            shroud.userData.targetRadius = 5.0;
            scene.add(shroud);

            scene.add(g);
            return { group: g, tag, shroud };
        }

        // ─── Operators ────────────────────────────────────────
        const operators = [
            makeBalloon(-22, 4, 8),
            makePlane(28, 14, -6, 0xc0c4cc),
            makeGlider(-2, 18, -22),
            makeSkydiver(14, -2, 18),
            makePlane(-30, 10, -28, 0xa8542a),
        ];

        // ─── Drone ────────────────────────────────────────────
        function makeDrone() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 0.25, 0.7),
                new THREE.MeshStandardMaterial({ color: 0x0a1525, roughness: 0.4, metalness: 0.7, emissive: 0x041018, emissiveIntensity: 0.4 })
            );
            g.add(body);

            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 12, 8),
                new THREE.MeshBasicMaterial({ color: 0x06b6d4 })
            );
            eye.position.y = -0.18;
            g.add(eye);

            const armPositions = [[0.55,0,0.55],[-0.55,0,0.55],[0.55,0,-0.55],[-0.55,0,-0.55]];
            const rotors = [];
            armPositions.forEach((p) => {
                const motor = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.12, 0.12, 0.15, 10),
                    new THREE.MeshStandardMaterial({ color: 0x222831 })
                );
                motor.position.set(p[0], 0.1, p[2]);
                g.add(motor);

                const rotor = new THREE.Mesh(
                    new THREE.BoxGeometry(0.85, 0.02, 0.06),
                    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4 })
                );
                rotor.position.set(p[0], 0.22, p[2]);
                g.add(rotor);
                rotors.push(rotor);

                const halo = new THREE.Mesh(
                    new THREE.RingGeometry(0.35, 0.5, 16),
                    new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false })
                );
                halo.position.set(p[0], 0.22, p[2]);
                halo.rotation.x = -Math.PI / 2;
                g.add(halo);
            });

            g.userData.rotors = rotors;
            return g;
        }

        const drone = makeDrone();
        scene.add(drone);

        // ─── Drone path ───────────────────────────────────────
        const pathPoints = [
            new THREE.Vector3(-70, 8, 60),
            new THREE.Vector3(-40, 10, 35),
            new THREE.Vector3(-10, 14, 22),
            new THREE.Vector3(8, 16, 4),
            new THREE.Vector3(20, 12, -18),
            new THREE.Vector3(45, 8, -38),
            new THREE.Vector3(70, 6, -55),
        ];
        const dronePath = new THREE.CatmullRomCurve3(pathPoints, false, 'catmullrom', 0.4);
        const tubeGeo = new THREE.TubeGeometry(dronePath, 200, 0.18, 8, false);
        const pathTube = new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({
            color: 0x06b6d4, transparent: true, opacity: 0.0, blending: THREE.AdditiveBlending, depthWrite: false
        }));
        scene.add(pathTube);

        // ─── Naive collision path ─────────────────────────────
        const naiveGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-70, 12, 0),
            new THREE.Vector3(70, 12, 0),
        ]);
        const naiveMat = new THREE.LineDashedMaterial({
            color: 0xef4444, dashSize: 1.4, gapSize: 0.9, transparent: true, opacity: 0.0
        });
        const naiveLine = new THREE.Line(naiveGeo, naiveMat);
        naiveLine.computeLineDistances();
        scene.add(naiveLine);

        // ─── Drone trail ──────────────────────────────────────
        const trailMax = 60;
        const trailGeo = new THREE.BufferGeometry();
        const trailPos = new Float32Array(trailMax * 3);
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
        const trailMat = new THREE.PointsMaterial({
            color: 0x06b6d4, size: 0.6, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
        });
        const trail = new THREE.Points(trailGeo, trailMat);
        scene.add(trail);
        const trailHistory = [];

        // ─── Phase state ──────────────────────────────────────
        let phase = 1;
        let autoPlay = true;
        let autoTimer = null;

        const phaseData = [
            { num: 'PHASE 01 / 04', title: 'The Low — invisible to the network', sub: 'Drone path cuts blind through manned traffic', status: 'SYS_STATUS: AIRSPACE BLIND — LEGACY VISIBILITY GAPS DETECTED', statusColor: '#ef4444' },
            { num: 'PHASE 02 / 04', title: 'Peck Tag retrofit', sub: '10-hour battery · clip-on · every operator visible', status: 'SYS_STATUS: PECK TAG NETWORK ESTABLISHED — 100% ALLIED VISIBILITY', statusColor: '#10b981' },
            { num: 'PHASE 03 / 04', title: '4D shroud forms', sub: 'Edge-computed at the Jetson Orin blade', status: 'SYS_STATUS: 4D DECONFLICTION VOLUMES LOCKED — SOVEREIGN EDGE NODE', statusColor: '#f59e0b' },
            { num: 'PHASE 04 / 04', title: 'Clean route computed', sub: 'Routed by miles, not feet', status: 'SYS_STATUS: ROUTE COMPLIANT — 52MS END-TO-END VERIFIED', statusColor: '#06b6d4' },
        ];

        const phaseNumEl = document.getElementById('phase-num');
        const phaseTitleEl = document.getElementById('phase-title');
        const phaseSubEl = document.getElementById('phase-sub');
        const statusEl = document.getElementById('status-bar');
        const stepBtns = document.querySelectorAll('.step-btn[data-phase]');
        const dotBtns = document.querySelectorAll('.phase-dot');
        const autoBtn = document.getElementById('auto-btn');

        function setPhase(n) {
            phase = n;
            const d = phaseData[n - 1];
            phaseNumEl.textContent = d.num;
            phaseTitleEl.textContent = d.title;
            phaseSubEl.textContent = d.sub;
            statusEl.textContent = d.status;
            statusEl.style.color = d.statusColor;
            statusEl.style.borderColor = d.statusColor + '66';
            stepBtns.forEach(b => b.classList.toggle('active', +b.dataset.phase === n));
            dotBtns.forEach(b => b.classList.toggle('active', +b.dataset.phase === n));
        }

        function startAuto() {
            if (autoTimer) clearInterval(autoTimer);
            autoTimer = setInterval(() => setPhase(phase % 4 + 1), 6500);
            autoBtn.classList.add('on');
            autoBtn.textContent = '■ AUTO-CYCLE: ON';
        }

        function stopAuto() {
            if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
            autoBtn.classList.remove('on');
            autoBtn.textContent = '▶ AUTO-CYCLE: OFF';
        }

        stepBtns.forEach(b => b.addEventListener('click', () => { stopAuto(); autoPlay = false; setPhase(+b.dataset.phase); }));
        dotBtns.forEach(b => b.addEventListener('click', () => { stopAuto(); autoPlay = false; setPhase(+b.dataset.phase); }));
        autoBtn.addEventListener('click', () => { autoPlay = !autoPlay; if (autoPlay) startAuto(); else stopAuto(); });

        startAuto();

        // ─── Resize ───────────────────────────────────────────
        function onResize() {
            width = host.clientWidth;
            height = host.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', onResize);

        // ─── Animation loop ───────────────────────────────────
        const clock = new THREE.Clock();
        let droneT = 0;
        let lastPhase = phase;

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.05);
            const elapsed = clock.getElapsedTime();
            const p = phase;

            if (p !== lastPhase) {
                lastPhase = p;
                if (p === 1 || p === 4) droneT = 0;
            }

            operators.forEach(({ group }) => {
                if (group.userData.bob) {
                    const b = group.userData.bob;
                    const speed = b.slow ? 0.6 : 1.4;
                    group.position.y = b.base + Math.sin(elapsed * speed + b.phase) * (b.slow ? 0.5 : 0.25);
                }
                if (group.userData.prop) group.userData.prop.rotation.x += 1.2;
            });

            operators.forEach(({ tag, group }) => {
                const want = p >= 2 ? 1 : 0;
                tag.scale.setScalar(THREE.MathUtils.lerp(tag.scale.x, want, 0.08));
                const halo = tag.children[1];
                if (halo) halo.scale.setScalar(1 + Math.sin(elapsed * 3 + group.position.x) * 0.15);
            });

            operators.forEach(({ group, shroud }) => {
                const want = p >= 3 ? shroud.userData.targetRadius : 0.001;
                shroud.position.lerp(group.position, 0.2);
                const breathe = 1 + Math.sin(elapsed * 1.5 + group.position.x * 0.1) * 0.04;
                const target = want * breathe;
                const next = THREE.MathUtils.lerp(shroud.scale.x, target, 0.05);
                if (shroud.userData.elongated) {
                    shroud.scale.set(next, next * 0.7, next * 1.3);
                } else {
                    shroud.scale.setScalar(next);
                }
                const wire = shroud.children[3];
                if (wire) { wire.rotation.y += 0.002; wire.rotation.x += 0.001; }
            });

            naiveMat.opacity = THREE.MathUtils.lerp(naiveMat.opacity, p === 1 ? 0.7 : 0.0, 0.08);
            pathTube.material.opacity = THREE.MathUtils.lerp(pathTube.material.opacity, p === 4 ? 0.4 : 0.0, 0.06);

            drone.userData.rotors.forEach((r) => { r.rotation.y += 1.5; });

            if (p === 4) {
                droneT += dt * 0.07;
                if (droneT > 1) droneT = 0;
                const pos2 = dronePath.getPointAt(droneT);
                const tan = dronePath.getTangentAt(Math.min(droneT + 0.001, 1));
                drone.position.copy(pos2);
                drone.position.y += Math.sin(elapsed * 4) * 0.15;
                drone.lookAt(pos2.clone().add(tan));

                trailHistory.unshift(pos2.clone());
                if (trailHistory.length > trailMax) trailHistory.length = trailMax;
                for (let i = 0; i < trailMax; i++) {
                    const pt = trailHistory[i] || pos2;
                    trailPos[i*3]   = pt.x;
                    trailPos[i*3+1] = pt.y;
                    trailPos[i*3+2] = pt.z;
                }
                trailGeo.attributes.position.needsUpdate = true;
                trailMat.opacity = 0.75;
            } else if (p === 1) {
                drone.position.set(-70, 12, 0);
                drone.lookAt(70, 12, 0);
                trailMat.opacity = 0;
            } else {
                drone.position.lerp(new THREE.Vector3(-65, 12, 30), 0.04);
                drone.lookAt(0, 10, 0);
                trailMat.opacity = THREE.MathUtils.lerp(trailMat.opacity, 0, 0.1);
            }

            const orbitT = elapsed * 0.05;
            let camR = 70, camY = 18, lookY = 8;
            if (p === 1) { camR = 78; camY = 22; lookY = 10; }
            if (p === 2) { camR = 60; camY = 16; lookY = 8; }
            if (p === 3) { camR = 65; camY = 20; lookY = 8; }
            if (p === 4) { camR = 72; camY = 18; lookY = 10; }

            camera.position.lerp(new THREE.Vector3(Math.cos(orbitT) * camR, camY, Math.sin(orbitT) * camR), 0.025);
            camera.position.y += Math.sin(elapsed * 0.7) * 0.08;
            camera.lookAt(0, lookY, 0);

            stars.rotation.y += 0.0001;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

    })();
    </script>
</body>
</html>
