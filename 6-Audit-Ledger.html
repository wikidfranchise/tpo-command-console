<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TPO Immutable Ledger & Actuarial Audit Trail</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #main-display { flex-grow: 1; display: flex; padding: 20px; gap: 20px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); overflow: hidden; }
        
        /* Left: Architecture & Visualization */
        #architecture-panel { flex: 4; position: relative; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .panel-title { position: absolute; top: 15px; left: 20px; color: #06b6d4; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; }
        
        .visual-node { width: 80px; height: 80px; background: #1e293b; border: 2px solid #64748b; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 10px; color: #cbd5e1; text-align: center; position: relative; z-index: 10; transition: all 0.3s; }
        .visual-node.active { border-color: #10b981; box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); }
        
        .pulse-ring { position: absolute; width: 100%; height: 100%; border-radius: 8px; border: 2px solid #10b981; top: -2px; left: -2px; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }
        .pulsing .pulse-ring { animation: pulse 1s ease-out; }

        /* Right: The Cryptographic Ledger */
        #ledger-panel { flex: 6; border: 1px solid #334155; border-radius: 8px; background: #000; padding: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #ledger-header { background: #0f172a; border-bottom: 1px solid #334155; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hash-ticker { font-family: 'Courier New', monospace; font-size: 11px; color: #64748b; }
        
        #ledger-scroll { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Ledger Blocks */
        .ledger-block { background: rgba(15, 23, 42, 0.95); border: 1px solid #334155; border-left: 4px solid #334155; padding: 15px; font-family: 'Courier New', monospace; font-size: 11px; color: #cbd5e1; opacity: 0; transform: translateY(20px); transition: all 0.4s ease-out; }
        .ledger-block.visible { opacity: 1; transform: translateY(0); }
        
        .block-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #334155; padding-bottom: 8px; margin-bottom: 8px; color: #94a3b8; }
        .block-row { display: flex; margin-bottom: 4px; }
        .block-key { width: 180px; color: #64748b; }
        .block-val { color: #e2e8f0; font-weight: bold; }
        
        .val-p1 { color: #ef4444; }
        .val-yield { color: #fbbf24; }
        .val-success { color: #10b981; }
        .val-hash { color: #06b6d4; font-size: 10px; }

        /* Tactical Controls */
        #controls { height: 70px; background: rgba(15, 23, 42, 0.95); border-top: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 1000; }
        .ctrl-btn { background: #0f172a; border: 1px solid #334155; color: #cbd5e1; padding: 12px 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
        .ctrl-btn:hover { background: #1e293b; color: white; border-color: #06b6d4; }
    </style>
</head>
<body>
    <div id="main-display">
        <div id="architecture-panel">
            <div class="panel-title">Edge Node Operations</div>
            <div style="display: flex; flex-direction: column; gap: 50px; align-items: center;">
                <div class="visual-node" id="node-sat">LEO<br>SAT MESH<div class="pulse-ring"></div></div>
                <div style="width: 2px; height: 50px; background: #334155;"></div>
                <div class="visual-node active" id="node-base" style="border-color: #06b6d4;">SOVEREIGN<br>EDGE NODE<div class="pulse-ring" style="border-color: #06b6d4;"></div></div>
                <div style="display: flex; gap: 40px; margin-top: 50px;">
                    <div class="visual-node" id="node-p1" style="border-color: #ef4444;">P1 ASSET<br>(NARCAN)<div class="pulse-ring" style="border-color: #ef4444;"></div></div>
                    <div class="visual-node" id="node-p4" style="border-color: #3b82f6;">P4 ASSET<br>(COMMERCIAL)<div class="pulse-ring" style="border-color: #3b82f6;"></div></div>
                </div>
            </div>
        </div>

        <div id="ledger-panel">
            <div id="ledger-header">
                <div class="panel-title" style="position: relative; top: 0; left: 0;">Immutable Airspace Ledger</div>
                <div class="hash-ticker">LATEST BLOCK: <span id="latest-hash" class="val-hash">AWAITING TRANSACTIONS...</span></div>
            </div>
            <div id="ledger-scroll">
                </div>
        </div>
    </div>

    <div id="controls">
        <button class="ctrl-btn" onclick="logEvent(1)">1. Log 4D Zone & Lease Grant</button>
        <button class="ctrl-btn" onclick="logEvent(2)">2. Log State Change & Yield</button>
        <button class="ctrl-btn" onclick="logEvent(3)">3. Log Chain of Custody Drop</button>
        <button class="ctrl-btn" onclick="logEvent(4)">4. Sync Actuarial Record</button>
    </div>

    <script>
        const scrollPanel = document.getElementById('ledger-scroll');
        const hashTicker = document.getElementById('latest-hash');

        function generateHash() {
            return '0x' + Array.from({length: 40}, () => Math.floor(Math.random()*16).toString(16)).join('');
        }

        function getUTC() {
            return new Date().toISOString();
        }

        function triggerPulse(nodeId) {
            const node = document.getElementById(nodeId);
            node.classList.remove('pulsing');
            void node.offsetWidth; // trigger reflow
            node.classList.add('pulsing');
        }

        const blocks = {
            1: `
                <div class="block-header"><span>TX_TIMESTAMP: {time}</span><span>NODE_ID: SVN-882-ALPHA</span></div>
                <div class="block-row"><span class="block-key">TRANSACTION_TYPE:</span><span class="block-val">COORDINATE_LEASE_GRANT</span></div>
                <div class="block-row"><span class="block-key">AUTHORIZATION:</span><span class="block-val val-p1">P1_LIFE_CRITICAL_RESPONSE</span></div>
                <div class="block-row"><span class="block-key">EXECUTION_LOGIC:</span><span class="block-val">4D_ZONE_ACTIVATION</span></div>
                <div class="block-row"><span class="block-key">ASSET_IDENTIFIER:</span><span class="block-val">RD-BLACKBIRD-09</span></div>
                <div class="block-row"><span class="block-key">CRYPTOGRAPHIC_HASH:</span><span class="block-val val-hash">{hash}</span></div>
            `,
            2: `
                <div class="block-header"><span>TX_TIMESTAMP: {time}</span><span>NODE_ID: SVN-882-ALPHA</span></div>
                <div class="block-row"><span class="block-key">TRANSACTION_TYPE:</span><span class="block-val">DYNAMIC_STATE_CHANGE</span></div>
                <div class="block-row"><span class="block-key">SUBORDINATE_ASSET:</span><span class="block-val">COMMERCIAL_ID_77492</span></div>
                <div class="block-row"><span class="block-key">ENFORCEMENT_ACTION:</span><span class="block-val val-yield">YIELD_COMPLIANCE_VERIFIED</span></div>
                <div class="block-row"><span class="block-key">LATENCY_DELTA:</span><span class="block-val">52_MILLISECONDS</span></div>
                <div class="block-row"><span class="block-key">CRYPTOGRAPHIC_HASH:</span><span class="block-val val-hash">{hash}</span></div>
            `,
            3: `
                <div class="block-header"><span>TX_TIMESTAMP: {time}</span><span>NODE_ID: SVN-882-ALPHA</span></div>
                <div class="block-row"><span class="block-key">TRANSACTION_TYPE:</span><span class="block-val">CHAIN_OF_CUSTODY_TRANSFER</span></div>
                <div class="block-row"><span class="block-key">PAYLOAD_DESIGNATION:</span><span class="block-val">NARCAN_4MG_NASAL</span></div>
                <div class="block-row"><span class="block-key">DELIVERY_STATUS:</span><span class="block-val val-success">CONFIRMED_RELEASE</span></div>
                <div class="block-row"><span class="block-key">TARGET_COORDINATES:</span><span class="block-val">ENCRYPTED_ZERO_KNOWLEDGE</span></div>
                <div class="block-row"><span class="block-key">CRYPTOGRAPHIC_HASH:</span><span class="block-val val-hash">{hash}</span></div>
            `,
            4: `
                <div class="block-header"><span>TX_TIMESTAMP: {time}</span><span>NODE_ID: SVN-882-ALPHA</span></div>
                <div class="block-row"><span class="block-key">TRANSACTION_TYPE:</span><span class="block-val">ACTUARIAL_SYNC_COMPLETE</span></div>
                <div class="block-row"><span class="block-key">DESTINATION_ROUTING:</span><span class="block-val">SATELLITE_BACKHAUL_MESH</span></div>
                <div class="block-row"><span class="block-key">LIABILITY_STATUS:</span><span class="block-val val-success">IMMUTABLE_RECORD_LOCKED</span></div>
                <div class="block-row"><span class="block-key">INSURANCE_BROKER_ID:</span><span class="block-val">VERIFIED_DATA_TRANSFER</span></div>
                <div class="block-row"><span class="block-key">CRYPTOGRAPHIC_HASH:</span><span class="block-val val-hash">{hash}</span></div>
            `
        };

        function logEvent(step) {
            const hash = generateHash();
            const time = getUTC();
            
            // Visual Pulses
            triggerPulse('node-base');
            if(step === 1) setTimeout(() => triggerPulse('node-p1'), 300);
            if(step === 2) { setTimeout(() => triggerPulse('node-p1'), 200); setTimeout(() => triggerPulse('node-p4'), 400); }
            if(step === 3) setTimeout(() => triggerPulse('node-p1'), 300);
            if(step === 4) setTimeout(() => triggerPulse('node-sat'), 300);

            // Inject Block
            const blockHtml = blocks[step].replace('{time}', time).replace(/{hash}/g, hash);
            
            const div = document.createElement('div');
            div.className = 'ledger-block';
            div.style.borderLeftColor = step === 1 ? '#ef4444' : step === 2 ? '#fbbf24' : step === 3 ? '#10b981' : '#06b6d4';
            div.innerHTML = blockHtml;
            
            scrollPanel.appendChild(div);
            
            // Trigger animation
            setTimeout(() => { div.classList.add('visible'); }, 50);
            
            // Auto scroll to bottom
            setTimeout(() => { scrollPanel.scrollTop = scrollPanel.scrollHeight; }, 100);

            // Update ticker
            hashTicker.innerText = hash;
            hashTicker.style.color = '#10b981';
            setTimeout(() => { hashTicker.style.color = '#06b6d4'; }, 500);
        }
    </script>
</body>
</html>
