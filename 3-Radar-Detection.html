<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TPO | Gods Eye Radar - Kill Box Protocol</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #radar-display { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #0f172a 0%, #000 100%); }
        #scanner { position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, rgba(6, 182, 212, 0.15) 0%, transparent 20%); transform-origin: center; animation: scan 4s linear infinite; z-index: 5; pointer-events: none; }
        @keyframes scan { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .radar-grid { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(rgba(6, 182, 212, 0.3) 1px, transparent 1px); background-size: 50px 50px; z-index: 1; }
        
        .target { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; width: 20px; height: 20px; transition: all 0.8s ease; }
        .target::after { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%; border: 1px solid currentColor; opacity: 0; transition: opacity 0.3s; }
        
        .state-neutral { background: rgba(34, 197, 94, 0.8); box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); color: #22c55e; }
        .state-verified { background: #22c55e; box-shadow: 0 0 15px #22c55e; color: #22c55e; }
        .state-verified::after { opacity: 1; border-color: #22c55e; border-width: 2px; animation: pulse-ring 1.5s ease-out infinite; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .state-hostile { background: #ef4444; box-shadow: 0 0 25px #ef4444; color: #ef4444; animation: pulse-hostile 1s infinite; }
        .state-hostile::after { opacity: 1; border-color: #ef4444; border-width: 2px; border-style: dashed; animation: rotate 2s linear infinite; }
        
        @keyframes pulse-hostile { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Tactical Controls */
        #controls { height: 70px; background: rgba(15, 23, 42, 0.95); border-top: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 1000; }
        .step-btn { background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 12px 24px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; border-radius: 4px; }
        .step-btn:hover:not(:disabled) { background: #1e293b; color: white; border-color: #06b6d4; }
        .step-btn.active { background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .step-btn.kill-active { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        
        #status-bar { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); border: 1px solid #334155; padding: 10px 20px; font-family: monospace; font-size: 14px; color: #06b6d4; z-index: 100; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="radar-display">
        <div class="radar-grid"></div>
        <div id="scanner"></div>
        <div id="status-bar">SYS_STATUS: RADAR FEED ACTIVE - RAW KINETIC DATA</div>
    </div>
    
    <div id="controls">
        <button class="step-btn active" id="btn1" onclick="setStep(1)">1. Raw Radar</button>
        <button class="step-btn" id="btn2" onclick="setStep(2)">2. Authenticate TPO Ledger</button>
        <button class="step-btn" id="btn3" onclick="setStep(3)">3. Reveal Non-Cooperative</button>
        <button class="step-btn" id="btn4" onclick="setStep(4)">4. EXECUTE KILL BOX</button>
    </div>

    <script>
        const radar = document.getElementById('radar-display');
        const status = document.getElementById('status-bar');
        let targets = [];

        function spawnSwarm() {
            for(let i=0; i<35; i++) {
                const el = document.createElement('div'); el.className = 'target state-neutral';
                const isCooperative = Math.random() > 0.15; // 85% compliant, 15% rogue
                const t = { el, isCooperative, x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5 };
                radar.appendChild(el); targets.push(t);
            }
            update();
        }

        function setStep(step) {
            document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active', 'kill-active'));
            document.getElementById('btn'+step).classList.add(step === 4 ? 'kill-active' : 'active');

            if (step === 1) {
                status.innerText = "SYS_STATUS: RADAR FEED ACTIVE - RAW KINETIC DATA"; status.style.color = "#06b6d4";
                targets.forEach(t => { t.el.className = 'target state-neutral'; t.el.style.opacity = '1'; t.vx *= (t.vx < 1 ? 1.5 : 1); t.vy *= (t.vy < 1 ? 1.5 : 1); });
            }
            if (step === 2) {
                status.innerText = "SYS_STATUS: METADATA OVERLAY - ALLIED SIGNATURES VERIFIED"; status.style.color = "#06b6d4";
                targets.forEach(t => { if(t.isCooperative) t.el.className = 'target state-verified'; else t.el.className = 'target state-neutral'; t.el.style.opacity = '1'; });
            }
            if (step === 3) {
                status.innerText = "SYS_STATUS: ANOMALY DETECTED - UNAUTHORIZED SIGNATURES PRESENT"; status.style.color = "#fbbf24";
                targets.forEach(t => { if(!t.isCooperative) t.el.className = 'target state-hostile'; t.el.style.opacity = '1'; });
            }
            if (step === 4) {
                status.innerText = "SYS_STATUS: KILL BOX PROTOCOL ENGAGED - ALLIED ASSETS FILTERED"; status.style.color = "#ef4444";
                targets.forEach(t => { if(!t.isCooperative) { t.vx *= 0.2; t.vy *= 0.2; } else { t.el.style.opacity = '0.15'; } });
            }
        }

        function update() {
            targets.forEach(t => { t.x += t.vx; t.y += t.vy; if (t.x < 0 || t.x > window.innerWidth) t.vx *= -1; if (t.y < 0 || t.y > window.innerHeight - 70) t.vy *= -1; t.el.style.left = t.x + 'px'; t.el.style.top = t.y + 'px'; });
            requestAnimationFrame(update);
        }

        window.onload = spawnSwarm;
    </script>
</body>
</html>
